version: '3.8'

services:
  mysql:
    image: mysql:latest
    environment:
      MYSQL_ROOT_PASSWORD: fiapOn
      MYSQL_DATABASE: dbfiapon
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  hadoop:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: hadoop
    environment:
      CLUSTER_NAME: hadoop_fiap
    ports:
      - "9870:9870"
    volumes:
      - hadoop_data:/hadoop/dfs
    
  airflow:
    build: .
    container_name: airflow
    # O comando abaixo é o que mantém o Airflow ligado!
    command: standalone
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: mysql+pymysql://root:fiapOn@mysql/dbfiapon
      AIRFLOW__WEBSERVER__RBAC: "true"
      _AIRFLOW_DB_UPGRADE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: "admin"
      _AIRFLOW_WWW_USER_PASSWORD: "admin"
    ports:
      - "8080:8080"
    volumes:
      - ./dags:/opt/airflow/dags
    depends_on:
      - mysql

volumes:
  mysql_data:
  hadoop_data: